<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blobby Volley 3D</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 3D Container -->
    <div id="game-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <button id="settings-btn">⚙️</button>
        <div id="hud">
            <div id="score">L 0 - 0 R</div>
            <div id="server-indicator"></div>
            <div id="message"></div>
            <div id="debug-info">FPS: 60</div>
        </div>
        
        <div id="panel">
            <h2>Blobby Volley 3D</h2>
            <div class="control-group">
                <label>Mode:</label>
                <div class="radio-group">
                    <input type="radio" id="mode-ai" name="mode" value="1P" checked><label for="mode-ai">1P</label>
                    <input type="radio" id="mode-2p" name="mode" value="2P"><label for="mode-2p">2P</label>
                    <input type="radio" id="mode-aia" name="mode" value="AIvsAI"><label for="mode-aia">AI-AI</label>
                </div>
            </div>
            <div class="control-group">
                <label>Difficulty:</label>
                <div class="radio-group">
                    <input type="radio" id="diff-easy" name="difficulty" value="Easy"><label for="diff-easy">Easy</label>
                    <input type="radio" id="diff-normal" name="difficulty" value="Normal" checked><label for="diff-normal">Normal</label>
                    <input type="radio" id="diff-hard" name="difficulty" value="Hard"><label for="diff-hard">Hard</label>
                </div>
            </div>
            
            <div class="separator"></div>
            <h3>Physics</h3>
            <div class="control-group">
                <label for="physics-preset">Preset:</label>
                <select id="physics-preset">
                    <option value="Default">Default</option>
                    <option value="Floaty">Floaty</option>
                    <option value="Fast">Fast</option>
                    <option value="Custom">Custom</option>
                </select>
            </div>
            <div class="slider-group">
                <label>Gravity</label>
                <input type="range" id="gravity-slider" min="5" max="30" value="18">
                <span id="gravity-value">18.0</span>
            </div>
            <div class="slider-group">
                <label>Bounce</label>
                <input type="range" id="bounce-slider" min="0.5" max="0.99" step="0.01" value="0.85">
                <span id="bounce-value">0.85</span>
            </div>

            <div class="button-group">
                <button id="action-btn">Start Game</button>
                <button id="theme-btn">Toggle Dark Mode</button>
            </div>
            <div class="instructions">
                P1: WASD | P2: Arrows | P: Pause
            </div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/planck-js@0.3.31/dist/planck.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Game Logic -->
    <script src="script.js"></script>
</body>
</html>
